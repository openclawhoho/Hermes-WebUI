<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 漫畫更新追蹤器 | 8bit Retro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0f0f23;
            color: #00ff41;
            font-family: 'Press Start 2P', monospace;
            font-size: var(--base-font-size, 10px);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0, 255, 65, 0.03) 0px, transparent 1px, transparent 2px, rgba(0, 255, 65, 0.03) 3px),
                repeating-linear-gradient(90deg, rgba(0, 255, 65, 0.03) 0px, transparent 1px, transparent 2px, rgba(0, 255, 65, 0.03) 3px);
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            border: 4px solid #00ff41;
            padding: 20px;
            background-color: rgba(15, 15, 35, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5),
                        inset 0 0 20px rgba(0, 255, 65, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #00ff41;
        }
        
        h1 {
            color: #ff41b4;
            font-size: var(--header-font-size, 16px);
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #0f0f23, 4px 4px 0 #ff41b4;
        }
        
        .subtitle {
            color: #41b4ff;
            font-size: var(--small-font-size, 8px);
        }
        
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            border: 2px solid #ffff41;
            background: rgba(255, 255, 65, 0.05);
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .font-size-control, .status-filter {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: var(--small-font-size, 8px);
        }
        
        .font-size-control { color: #ffff41; }
        .status-filter { color: #41b4ff; }
        
        .font-size-control select, .status-filter select {
            background: #0f0f23;
            border: 2px solid;
            color: inherit;
            padding: 5px;
            font-family: 'Press Start 2P', monospace;
            font-size: var(--small-font-size, 8px);
            cursor: pointer;
        }
        
        .font-size-control select { border-color: #ffff41; }
        .status-filter select { border-color: #41b4ff; }
        
        /* 浮動排序面板 */
        .sort-panel {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 15, 35, 0.95);
            border: 2px solid #ff41b4;
            padding: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            transition: all 0.3s;
        }
        
        .sort-panel.floating {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 900px;
            width: 90%;
            box-shadow: 0 0 30px rgba(255, 65, 180, 0.8);
        }
        
        .sort-panel label {
            color: #ff41b4;
            font-size: var(--small-font-size, 8px);
        }
        
        .sort-panel select, .sort-panel button {
            background: #0f0f23;
            border: 2px solid #ff41b4;
            color: #ff41b4;
            padding: 5px;
            font-family: 'Press Start 2P', monospace;
            font-size: var(--small-font-size, 8px);
            cursor: pointer;
        }
        
        .sort-panel button:hover {
            background: rgba(255, 65, 180, 0.2);
        }
        
        .sort-panel .toggle-float {
            margin-left: auto;
            background: #ff41b4;
            color: #0f0f23;
            border: none;
            padding: 5px 10px;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box label {
            display: block;
            margin-bottom: 10px;
            color: #ffff41;
            font-size: var(--base-font-size, 10px);
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        input[type="text"], input[type="number"] {
            flex: 1;
            background: #0f0f23;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 10px;
            font-family: 'Press Start 2P', monospace;
            font-size: var(--base-font-size, 10px);
            outline: none;
        }
        
        input[type="text"]:focus, input[type="number"]:focus {
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.8);
        }
        
        .manual-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .manual-input input {
            width: 100px;
        }
        
        .manual-input label {
            font-size: var(--small-font-size, 8px) !important;
            color: #ff41b4 !important;
            margin-bottom: 5px !important;
        }
        
        button {
            background: #00ff41;
            color: #0f0f23;
            border: none;
            padding: 10px 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: var(--base-font-size, 10px);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #ffff41;
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .add-manga-section {
            margin-top: 20px;
            padding: 15px;
            border: 2px dashed #ff41b4;
            background: rgba(255, 65, 180, 0.05);
        }
        
        .add-manga-section h3 {
            color: #ff41b4;
            font-size: var(--base-font-size, 10px);
            margin-bottom: 10px;
        }
        
        .add-manga-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .add-manga-form input {
            flex: 1;
            min-width: 150px;
        }
        
        .updates-section {
            margin-top: 30px;
        }
        
        .section-title {
            color: #ff4141;
            font-size: var(--base-font-size, 12px);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ff4141;
        }
        
        .update-item {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid #00ff41;
            padding: 15px;
            margin-bottom: 10px;
            transition: all 0.3s;
            font-size: var(--base-font-size, 10px);
            position: relative;
        }
        
        .update-item:hover {
            background: rgba(0, 255, 65, 0.1);
            transform: translateX(5px);
        }
        
        .manga-content {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        
        .manga-cover {
            flex-shrink: 0;
            width: 100px;
            height: 140px;
            border: 2px solid #00ff41;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .manga-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .manga-cover.no-cover {
            color: #00ff41;
            font-size: var(--tiny-font-size, 7px);
            text-align: center;
            padding: 10px;
            line-height: 1.5;
        }
        
        /* 編輯模式時隱藏封面圖片，顯示輸入框 */
        .update-item.editing .manga-cover img,
        .update-item.editing .manga-cover .no-cover-text {
            display: none !important;
        }
        
        .update-item.editing .cover-edit {
            display: block !important;
        }
        
        .no-cover-text {
            color: #00ff41;
            font-size: var(--tiny-font-size, 7px);
            text-align: center;
            padding: 10px;
            line-height: 1.5;
            display: none;
        }
        
        .manga-details {
            flex: 1;
        }
        
        .update-item.editing {
            background: rgba(255, 65, 180, 0.1);
            border-color: #ff41b4;
        }
        
        .manga-title {
            color: #41b4ff;
            font-size: var(--base-font-size, 10px);
            margin-bottom: 5px;
        }
        
        .manga-info {
            color: #ffff41;
            font-size: var(--small-font-size, 8px);
            margin-bottom: 3px;
        }
        
        .manga-info input {
            width: 60px;
            padding: 3px;
            margin-right: 5px;
            font-size: var(--small-font-size, 8px);
        }
        
        .manga-info select {
            background: #0f0f23;
            border: 1px solid #ffff41;
            color: #ffff41;
            padding: 2px;
            font-size: var(--small-font-size, 8px);
            font-family: 'Press Start 2P', monospace;
        }
        
        .edit-controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        
        .edit-controls button {
            font-size: var(--small-font-size, 8px);
            padding: 5px 10px;
        }
        
        .edit-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #41b4ff;
            color: #0f0f23;
            border: none;
            padding: 5px 10px;
            font-size: var(--tiny-font-size, 7px);
            cursor: pointer;
        }
        
        .edit-btn:hover {
            background: #00ff41;
        }
        
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            font-size: var(--tiny-font-size, 7px);
            border: 1px solid;
            margin-top: 5px;
        }
        
        .status-new { color: #00ff41; border-color: #00ff41; }
        .status-updated { color: #ffff41; border-color: #ffff41; }
        .status-ongoing { color: #41b4ff; border-color: #41b4ff; }
        .status-completed { color: #ff4141; border-color: #ff4141; }
        
        .loading {
            text-align: center;
            color: #ffff41;
            padding: 20px;
            font-size: var(--base-font-size, 10px);
        }
        
        .error {
            color: #ff4141;
            padding: 10px;
            border: 1px solid #ff4141;
            background: rgba(255, 65, 65, 0.1);
            margin-top: 10px;
            font-size: var(--base-font-size, 10px);
        }
        
        .success {
            color: #00ff41;
            padding: 10px;
            border: 1px solid #00ff41;
            background: rgba(0, 255, 65, 0.1);
            margin-top: 10px;
            font-size: var(--base-font-size, 10px);
        }
        
        .pixel-border {
            position: relative;
        }
        
        .pixel-border::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: linear-gradient(45deg, #00ff41 25%, transparent 25%, transparent 75%, #00ff41 75%),
                        linear-gradient(45deg, #00ff41 25%, transparent 25%, transparent 75%, #00ff41 75%);
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px;
            z-index: -1;
        }
        
        #result {
            margin-top: 20px;
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    
    <div class="container pixel-border">
        <div class="header">
            <h1>🎮 漫畫更新追蹤器</h1>
            <div class="subtitle">8bit Retro Style | Powered by Hermes</div>
        </div>
        
        <div class="controls-bar">
            <div class="font-size-control">
                <label>🔤 文字大小：</label>
                <select id="fontSizeSelect" onchange="changeFontSize()">
                    <option value="small">小 (8px)</option>
                    <option value="default" selected>中 (10px)</option>
                    <option value="large">大 (14px)</option>
                    <option value="xlarge">特大 (18px)</option>
                </select>
            </div>
            
            <div class="status-filter">
                <label>📊 狀態篩選：</label>
                <select id="statusFilter" onchange="filterUpdates()">
                    <option value="all">全部</option>
                    <option value="ongoing" selected>連載中</option>
                    <option value="completed">已完結</option>
                </select>
            </div>
        </div>
        
        <!-- 浮動排序面板 -->
        <div class="sort-panel" id="sortPanel">
            <label>🔃 排序：</label>
            <select id="sortField" onchange="sortUpdates()">
                <option value="name">名稱</option>
                <option value="volume">卷數</option>
                <option value="chapter">話數</option>
                <option value="status">狀態</option>
                <option value="author">作者</option>
                <option value="lastModified">更新日期</option>
            </select>
            <select id="sortOrder" onchange="sortUpdates()">
                <option value="asc">升序 ↑</option>
                <option value="desc">降序 ↓</option>
            </select>
            <button class="toggle-float" onclick="toggleFloat()">📌 固定</button>
        </div>
        
        <div class="search-box">
            <label>🔍 輸入漫畫名稱：</label>
            <div class="input-group">
                <input type="text" id="mangaInput" placeholder="例如：天國大魔境" />
                <button onclick="queryManga()">查詢</button>
            </div>
            
            <div class="manual-input">
                <div>
                    <label>手動輸入卷數：</label>
                    <input type="number" id="manualVolume" placeholder="卷" min="0" />
                </div>
                <div>
                    <label>手動輸入話數：</label>
                    <input type="number" id="manualChapter" placeholder="話" min="0" />
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button onclick="queryMangaWithManual()" style="font-size: var(--small-font-size, 8px); padding: 8px 15px;">使用手動數值查詢</button>
                </div>
            </div>
            <div style="margin-top: 5px; font-size: var(--small-font-size, 8px); color: #ff41b4;">
                💡 提示：輸入手動卷話數後，系統會優先使用您輸入的數值進行比對
            </div>
        </div>
        
        <div id="result"></div>
        
        <div class="add-manga-section">
            <h3>➕ 新增追蹤漫畫</h3>
            <div class="add-manga-form">
                <input type="text" id="newMangaName" placeholder="漫畫名稱（必填）" />
                <input type="text" id="newMangaAlias" placeholder="別名（選填）" />
                <input type="text" id="newMangaStatus" placeholder="狀態（連載中/完結）" />
                <button onclick="addNewManga()" style="font-size: var(--small-font-size, 8px);">新增</button>
            </div>
            <div style="margin-top: 5px; font-size: var(--small-font-size, 8px); color: #41b4ff;">
                💡 新增後會自動加入每日更新追蹤清單
            </div>
        </div>
        
        <div class="updates-section">
            <div class="section-title">📢 最新更新消息</div>
            <div id="updatesList">
                <div class="loading">載入中...</div>
            </div>
        </div>
    </div>
    
    <script>
        // 儲存所有更新資料
        let allUpdates = [];
        let isFloating = false;
        
        // 文字大小設定
        function changeFontSize() {
            const size = document.getElementById('fontSizeSelect').value;
            const root = document.documentElement;
            
            switch(size) {
                case 'small':
                    root.style.setProperty('--base-font-size', '8px');
                    root.style.setProperty('--header-font-size', '12px');
                    root.style.setProperty('--small-font-size', '6px');
                    root.style.setProperty('--tiny-font-size', '5px');
                    break;
                case 'default':
                    root.style.setProperty('--base-font-size', '10px');
                    root.style.setProperty('--header-font-size', '16px');
                    root.style.setProperty('--small-font-size', '8px');
                    root.style.setProperty('--tiny-font-size', '7px');
                    break;
                case 'large':
                    root.style.setProperty('--base-font-size', '14px');
                    root.style.setProperty('--header-font-size', '20px');
                    root.style.setProperty('--small-font-size', '10px');
                    root.style.setProperty('--tiny-font-size', '8px');
                    break;
                case 'xlarge':
                    root.style.setProperty('--base-font-size', '18px');
                    root.style.setProperty('--header-font-size', '24px');
                    root.style.setProperty('--small-font-size', '12px');
                    root.style.setProperty('--tiny-font-size', '10px');
                    break;
            }
            
            localStorage.setItem('manga-font-size', size);
        }
        
        // 載入保存的字體大小設定
        window.addEventListener('load', function() {
            const savedSize = localStorage.getItem('manga-font-size');
            if (savedSize) {
                document.getElementById('fontSizeSelect').value = savedSize;
                changeFontSize();
            }
            loadUpdates();
        });
        
        // 切換浮動/固定排序面板
        function toggleFloat() {
            const panel = document.getElementById('sortPanel');
            const btn = panel.querySelector('.toggle-float');
            
            isFloating = !isFloating;
            
            if (isFloating) {
                panel.classList.add('floating');
                btn.textContent = '📍 浮動中';
            } else {
                panel.classList.remove('floating');
                btn.textContent = '📌 固定';
            }
        }
        
        // 排序功能
        function sortUpdates() {
            const field = document.getElementById('sortField').value;
            const order = document.getElementById('sortOrder').value;
            
            allUpdates.sort((a, b) => {
                let valA, valB;
                
                switch(field) {
                    case 'name':
                        valA = (a.name || '').toLowerCase();
                        valB = (b.name || '').toLowerCase();
                        break;
                    case 'volume':
                        valA = parseInt(a.volume) || 0;
                        valB = parseInt(b.volume) || 0;
                        break;
                    case 'chapter':
                        valA = parseInt(a.chapter) || 0;
                        valB = parseInt(b.chapter) || 0;
                        break;
                    case 'status':
                        valA = a.status || '';
                        valB = b.status || '';
                        break;
                    case 'author':
                        valA = (a.author || '未知').toLowerCase();
                        valB = (b.author || '未知').toLowerCase();
                        break;
                    case 'lastModified':
                        // 將日期字符串轉換為時間戳進行比較
                        valA = a.lastModified && a.lastModified !== 'N/A' ? new Date(a.lastModified).getTime() : 0;
                        valB = b.lastModified && b.lastModified !== 'N/A' ? new Date(b.lastModified).getTime() : 0;
                        break;
                    default:
                        return 0;
                }
                
                let result = 0;
                if (typeof valA === 'string') {
                    result = valA.localeCompare(valB);
                } else {
                    result = valA - valB;
                }
                
                return order === 'desc' ? -result : result;
            });
            
            renderUpdates();
        }
        
        // 狀態篩選
        function filterUpdates() {
            const status = document.getElementById('statusFilter').value;
            
            let filtered = allUpdates;
            if (status !== 'all') {
                filtered = allUpdates.filter(update => {
                    if (status === 'ongoing') return update.status !== '完結' && update.status !== 'FINISHED';
                    if (status === 'completed') return update.status === '完結' || update.status === 'FINISHED';
                    return true;
                });
            }
            
            renderUpdates(filtered);
        }
        
        // 渲染更新列表
        function renderUpdates(updates) {
            const updatesList = document.getElementById('updatesList');
            const data = updates || allUpdates;
            
            if (data.length > 0) {
                updatesList.innerHTML = data.map((update, index) => {
                    const isCompleted = update.status === '完結' || update.status === 'FINISHED';
                    const coverUrl = update.cover_url;
                    
                    // 預先處理封面 HTML
                    let coverHtml = '';
                    const coverId = `cover-display-${index}`;
                    if (coverUrl) {
                        coverHtml = `
                            <div class="manga-cover" id="${coverId}">
                                <img src="${coverUrl}" alt="${update.name}" 
                                     onload="console.log('✅ 封面加載成功:', this.src);" 
                                     onerror="console.error('❌ 封面加載失敗:', this.src); this.parentElement.classList.add('no-cover'); this.style.display='none'; this.nextElementSibling.style.display='block';" />
                                <div class="no-cover-text" style="display:none;">📚<br>無封面</div>
                                <div class="cover-edit" style="display:none; margin-top:5px; text-align:center;">
                                    <small style="color:#00ff41; font-size:var(--tiny-font-size, 7px);">封面URL:</small><br>
                                    <input type="text" id="edit-cover-${index}" value="${coverUrl}" placeholder="輸入封面圖片URL" style="width:90px; font-size:var(--tiny-font-size, 7px); background:#000; color:#00ff41; border:1px solid #00ff41;" />
                                </div>
                            </div>
                        `;
                    } else {
                        coverHtml = `
                            <div class="manga-cover no-cover" id="${coverId}">
                                📚<br>無封面
                                <div class="cover-edit" style="display:none; margin-top:5px; text-align:center;">
                                    <small style="color:#00ff41; font-size:var(--tiny-font-size, 7px);">封面URL:</small><br>
                                    <input type="text" id="edit-cover-${index}" value="" placeholder="輸入封面圖片URL" style="width:90px; font-size:var(--tiny-font-size, 7px); background:#000; color:#00ff41; border:1px solid #00ff41;" />
                                </div>
                            </div>
                        `;
                    }
                    
                    return `
                        <div class="update-item" id="item-${index}">
                            <button class="edit-btn" onclick="toggleEdit(${index})">✏️ 編輯</button>
                            
                            <div class="manga-content">
                                ${coverHtml}
                                
                                <div class="manga-details">
                                    <div class="manga-title">
                                        📚 ${update.komga_series_id 
                                            ? `<a href="https://komga.hoooooooo.synology.me:448/series/${update.komga_series_id}" target="_blank" style="color:#00ff41; text-decoration:none; font-size:inherit;" onmouseover="this.style.color='#ffff41'" onmouseout="this.style.color='#00ff41'">${update.name}</a>`
                                            : update.name}
                                    </div>
                                    <div class="manga-info" id="author-info-${index}">
                                        <span class="info-display">
                                            作者: ${update.author || '未知'}
                                        </span>
                                        <span class="info-edit" style="display:none;">
                                            作者: <input type="text" id="edit-author-${index}" value="${update.author || ''}" />
                                        </span>
                                    </div>
                                    <div class="manga-info" id="date-info-${index}">
                                        <span class="info-display">
                                            更新: ${update.lastModified || 'N/A'}
                                        </span>
                                        <span class="info-edit" style="display:none;">
                                            更新: <input type="text" id="edit-date-${index}" value="${update.lastModified || ''}" placeholder="YYYY-MM-DD" />
                                        </span>
                                    </div>
                                    <div class="manga-info" id="info-${index}">
                                        <span class="info-display">
                                            卷數: ${update.volume || 'N/A'}
                                        </span>
                                        <span class="info-edit" style="display:none;">
                                            卷數: <input type="number" id="edit-volume-${index}" value="${update.volume || 0}" min="0" />
                                        </span>
                                    </div>
                                    <div class="manga-info" id="chapter-info-${index}">
                                        <span class="info-display">
                                            話數: ${update.chapter || 'N/A'}
                                        </span>
                                        <span class="info-edit" style="display:none;">
                                            話數: <input type="number" id="edit-chapter-${index}" value="${update.chapter || 0}" min="0" />
                                        </span>
                                    </div>
                                    <div class="manga-info" id="status-info-${index}">
                                        <span class="info-display">
                                            狀態: ${update.status || 'N/A'}
                                        </span>
                                        <span class="info-edit" style="display:none;">
                                            狀態: 
                                            <select id="edit-status-${index}">
                                                <option value="RELEASING" ${update.status === 'RELEASING' ? 'selected' : ''}>連載中</option>
                                                <option value="FINISHED" ${update.status === 'FINISHED' || update.status === '完結' ? 'selected' : ''}>已完結</option>
                                            </select>
                                        </span>
                                    </div>
                                    <div class="edit-controls" id="edit-controls-${index}" style="display:none;">
                                        <button onclick="saveEdit(${index})" style="background:#00ff41;">💾 保存</button>
                                        <button onclick="cancelEdit(${index})" style="background:#ff4141;">✖ 取消</button>
                                    </div>
                                    <span class="status-badge ${isCompleted ? 'status-completed' : 'status-ongoing'}">
                                        ${isCompleted ? '已完結' : '連載中'}
                                    </span>
                                    <div style="text-align:right; margin-top:10px;">
                                        <button class="delete-btn" onclick="deleteManga(${index})" style="background:#ff4141; color:#fff; border:1px solid #ff4141; font-size:var(--tiny-font-size, 7px); padding:2px 6px; cursor:pointer;">🗑️ 刪除</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                updatesList.innerHTML = '<div class="loading">目前沒有更新消息</div>';
            }
        }
        
        // 切換編輯模式
        function toggleEdit(index) {
            const item = document.getElementById(`item-${index}`);
            const displays = item.querySelectorAll('.info-display');
            const edits = item.querySelectorAll('.info-edit');
            const controls = document.getElementById(`edit-controls-${index}`);
            const coverDisplay = document.getElementById(`cover-display-${index}`);
            const coverEdit = coverDisplay ? coverDisplay.querySelector('.cover-edit') : null;
            
            item.classList.toggle('editing');
            
            displays.forEach(el => {
                el.style.display = item.classList.contains('editing') ? 'none' : 'inline';
            });
            edits.forEach(el => {
                el.style.display = item.classList.contains('editing') ? 'inline' : 'none';
            });
            controls.style.display = item.classList.contains('editing') ? 'flex' : 'none';
            
            // 切換封面編輯
            if (coverEdit) {
                if (item.classList.contains('editing')) {
                    coverEdit.style.display = 'block';
                } else {
                    coverEdit.style.display = 'none';
                }
            }
        }
        
        // 保存編輯
        async function saveEdit(index) {
            const item = allUpdates[index];
            const newVolume = document.getElementById(`edit-volume-${index}`).value;
            const newChapter = document.getElementById(`edit-chapter-${index}`).value;
            const newStatus = document.getElementById(`edit-status-${index}`).value;
            const newAuthor = document.getElementById(`edit-author-${index}`).value.trim();
            const newDate = document.getElementById(`edit-date-${index}`).value.trim();
            const newCover = document.getElementById(`edit-cover-${index}`).value.trim();
            
            try {
                const response = await fetch('/api/manga/update', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: item.name,
                        volume: newVolume ? parseInt(newVolume) : null,
                        chapter: newChapter ? parseInt(newChapter) : null,
                        status: newStatus,
                        author: newAuthor || null,
                        lastModified: newDate || null,
                        cover_url: newCover || null
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 更新本地資料
                    allUpdates[index].volume = newVolume ? parseInt(newVolume) : null;
                    allUpdates[index].chapter = newChapter ? parseInt(newChapter) : null;
                    allUpdates[index].status = newStatus === 'FINISHED' ? '完結' : 'RELEASING';
                    allUpdates[index].author = newAuthor || '未知';
                    allUpdates[index].lastModified = newDate || 'N/A';
                    allUpdates[index].cover_url = newCover || null;
                    
                    // 重新渲染
                    renderUpdates();
                    
                    document.getElementById('result').innerHTML = 
                        '<div class="success">✅ 已更新漫畫資料：' + item.name + '</div>';
                    
                    setTimeout(() => {
                        document.getElementById('result').innerHTML = '';
                    }, 3000);
                } else {
                    document.getElementById('result').innerHTML = 
                        `<div class="error">保存失敗: ${data.error || '未知錯誤'}</div>`;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    `<div class="error">保存失敗: ${error.message}</div>`;
            }
        }
        function cancelEdit(index) {
            toggleEdit(index);
        }
        
        // 載入最新更新
        async function loadUpdates() {
            try {
                const response = await fetch('/api/manga/updates');
                const data = await response.json();
                
                if (data.updates && data.updates.length > 0) {
                    allUpdates = data.updates;
                    renderUpdates();
                } else {
                    document.getElementById('updatesList').innerHTML = 
                        '<div class="loading">目前沒有更新消息</div>';
                }
            } catch (error) {
                document.getElementById('updatesList').innerHTML = 
                    `<div class="error">載入失敗: ${error.message}</div>`;
            }
        }
        
        // 查詢漫畫
        async function queryManga() {
            const input = document.getElementById('mangaInput');
            const mangaName = input.value.trim();
            
            if (!mangaName) {
                alert('請輸入漫畫名稱！');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading">查詢中...</div>';
            
            try {
                const response = await fetch('/api/manga/query', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: mangaName})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <div class="manga-title">✅ ${data.name}</div>
                            <div class="manga-info">來源: ${data.source || 'N/A'}</div>
                            <div class="manga-info">最新話數: ${data.chapter || 'N/A'}</div>
                            <div class="manga-info">狀態: ${data.status || 'N/A'}</div>
                            ${data.message ? `<div class="manga-info" style="margin-top:10px;">${data.message}</div>` : ''}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="error">查詢失敗: ${data.error || '未知錯誤'}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">查詢失敗: ${error.message}</div>`;
            }
        }
        
        // 使用手動輸入的卷話數查詢
        async function queryMangaWithManual() {
            const input = document.getElementById('mangaInput');
            const mangaName = input.value.trim();
            const manualVolume = document.getElementById('manualVolume').value;
            const manualChapter = document.getElementById('manualChapter').value;
            
            if (!mangaName) {
                alert('請輸入漫畫名稱！');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading">使用手動數值查詢中...</div>';
            
            try {
                const response = await fetch('/api/manga/query', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: mangaName,
                        manual_volume: manualVolume ? parseInt(manualVolume) : null,
                        manual_chapter: manualChapter ? parseInt(manualChapter) : null
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    let message = data.message || '';
                    if (manualVolume || manualChapter) {
                        message += `<br>📌 使用手動數值：卷=${manualVolume || '未輸入'}, 話=${manualChapter || '未輸入'}`;
                    }
                    
                    resultDiv.innerHTML = `
                        <div class="success">
                            <div class="manga-title">✅ ${data.name}</div>
                            <div class="manga-info">來源: ${data.source || 'N/A'}</div>
                            <div class="manga-info">最新話數: ${data.chapter || 'N/A'}</div>
                            <div class="manga-info">狀態: ${data.status || 'N/A'}</div>
                            ${message ? `<div class="manga-info" style="margin-top:10px;">${message}</div>` : ''}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="error">查詢失敗: ${data.error || '未知錯誤'}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">查詢失敗: ${error.message}</div>`;
            }
        }
        
        // 新增漫畫
        async function addNewManga() {
            const name = document.getElementById('newMangaName').value.trim();
            const alias = document.getElementById('newMangaAlias').value.trim();
            const status = document.getElementById('newMangaStatus').value.trim();
            
            if (!name) {
                alert('請輸入漫畫名稱！');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading">新增中...</div>';
            
            try {
                const response = await fetch('/api/manga/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: name,
                        alias: alias,
                        status: status || '連載中'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            ✅ 成功新增漫畫：${name}<br>
                            ${data.message || ''}
                        </div>
                    `;
                    document.getElementById('newMangaName').value = '';
                    document.getElementById('newMangaAlias').value = '';
                    document.getElementById('newMangaStatus').value = '';
                    
                    setTimeout(() => loadUpdates(), 2000);
                } else {
                    resultDiv.innerHTML = `<div class="error">新增失敗: ${data.error || '未知錯誤'}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">新增失敗: ${error.message}</div>`;
            }
        }
        
        // 刪除漫畫（含確認對話框）
        async function deleteManga(index) {
            const item = allUpdates[index];
            if (!item) return;
            
            // 確認對話框，防止誤觸
            if (!confirm(`確定要刪除《${item.name}》嗎？\n\n此操作無法復原！`)) {
                return;
            }
            
            try {
                const response = await fetch('/api/manga/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: item.name})
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ ' + result.message);
                    // 重新載入列表
                    loadUpdates();
                } else {
                    alert('❌ 刪除失敗: ' + (result.error || '未知錯誤'));
                }
            } catch (error) {
                alert('❌ 刪除失敗: ' + error.message);
            }
        }
        
        // 允許按 Enter 鍵查詢
        document.getElementById('mangaInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                queryManga();
            }
        });
    </script>
</body>
</html>
